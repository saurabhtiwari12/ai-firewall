name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: |
          flake8 firewall-engine/ ml_training/ threat_intelligence/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --exclude=__pycache__,*.egg-info

  test-backend:
    name: Test Backend API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend-api/package-lock.json
      - name: Install dependencies
        working-directory: backend-api
        run: npm ci
      - name: Run tests
        working-directory: backend-api
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-at-least-32-chars-long
          JWT_REFRESH_SECRET: test-refresh-secret-32-chars-ok
          MONGO_URI: mongodb://localhost:27017/ai-firewall-test

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build firewall engine image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.firewall
          push: false
          tags: ai-firewall/engine:ci
      - name: Build backend API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: false
          tags: ai-firewall/backend:ci
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: false
          tags: ai-firewall/frontend:ci

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: "."
          severity: CRITICAL,HIGH
          exit-code: "0"
