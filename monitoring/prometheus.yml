global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    monitor: "ai-firewall-monitor"
    environment: "development"

rule_files: []

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "backend-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend-api:3001"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: "firewall-engine"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["firewall-engine:8000"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
