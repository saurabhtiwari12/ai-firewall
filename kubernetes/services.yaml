---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-firewall-config
  namespace: ai-firewall
data:
  NODE_ENV: "production"
  PORT: "3001"
  MONGO_HOST: "mongodb-svc"
  MONGO_PORT: "27017"
  MONGO_DB: "ai-firewall"
  REDIS_HOST: "redis-svc"
  REDIS_PORT: "6379"
  BACKEND_API_URL: "http://backend-svc:3001"
---
apiVersion: v1
kind: Service
metadata:
  name: firewall-engine-svc
  namespace: ai-firewall
  labels:
    app: firewall-engine
spec:
  selector:
    app: firewall-engine
  ports:
    - name: metrics
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: ai-firewall
  labels:
    app: backend-api
spec:
  selector:
    app: backend-api
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: ai-firewall
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-svc
  namespace: ai-firewall
  labels:
    app: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
  clusterIP: None
---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: ai-firewall
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-firewall-ingress
  namespace: ai-firewall
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - firewall.example.com
        - api.firewall.example.com
      secretName: ai-firewall-tls
  rules:
    - host: firewall.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
    - host: api.firewall.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 3001
