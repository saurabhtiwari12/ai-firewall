apiVersion: apps/v1
kind: Deployment
metadata:
  name: firewall-engine
  namespace: ai-firewall
  labels:
    app: firewall-engine
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: firewall-engine
  template:
    metadata:
      labels:
        app: firewall-engine
    spec:
      serviceAccountName: firewall-engine-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: firewall-engine
          image: your-registry/firewall-engine:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: ai-firewall-secrets
                  key: mongo-uri
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: ai-firewall-config
                  key: redis-url
            - name: PROMETHEUS_PORT
              value: "8000"
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: model-storage
              mountPath: /app/models
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-pvc
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: firewall-engine-sa
  namespace: ai-firewall
